<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kotoe Takeda's Website</title>
    <link rel="icon" type="image/x-icon" href="profilePicture.JPG">
    <link rel="stylesheet" href="contact.css">
    <script
        type="text/javascript"
        src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js">
    </script>
    <script type="text/javascript">
        (function () {
            emailjs.init("JVvkuGQUcVqr53bpI");
        })();
    </script>
    <script src="contact.js"></script>
</head>
<body>
    <nav id="navigation">
        <a href="index.html" class="logo">Kotoe Takeda</a>
        <a href="index.html" id="home" class="navLink">&nbsp;Home</a>
        <a href="portfolio.html" id="portfolio" class="navLink">Portfolio</a>
        <a href="resume.html" id="resume" class="navLink">Resume</a>
        <a href="contact.html" id="contact" class="navLink">Contact</a>
    </nav>
    <main>
        <h1>Let's Connect</h1>
        <form id="contactForm">
            <div class="left" id="inputFields">
                <input type="hidden" name="contact_number">
                <input class="field" id="name" type="text" required placeholder="Full Name *"><br>
                <input class="field" id="email" type="email" required placeholder="Email *"><br>
                <input class="field" id="message" type="text" placeholder="Message"><br>
                <br>
                <input id="submit" type="submit" value="Send">
            </div>
            <div class="right">
                <h4 id="contactLabel">Contact:</h4>
                <p id="contactText">ktakeda3@gatech.edu</p>
                <br><br>
                <h4 id="addressLabel">Based in:</h4>
                <p id="addressText">Atlanta, Georgia</p>
                <a title="email: ktakeda3@gatech.edu" href="mailto: ktakeda3@gatech.edu" target="_blank" class="logoLink"><img class="logoPic" id="mailPic" src="email.png" alt="Gmail logo"></a>
                <a title="username: kotoetakeda" href="https://www.linkedin.com/in/kotoetakeda/" target="_blank" class="logoLink"><img class="logoPic" src="linkedin.png" alt="LinkedIn logo"></a>
                <a title="username: kotoetakeda" href="https://github.com/kotoetakeda?tab=repositories" target="_blank" class="logoLink"><img class="logoPic" src="github logo.png" alt="GitHub logo"></a>
            </div>
        </form>
        <div id="myModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <div id="text">
                    <p>Thanks for the message!<br>I'll get back to you soon :&#41;</p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
