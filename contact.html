<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Kotoe Takeda's Website</title>
        <link rel="stylesheet" href="contact.css"> 

        <script
            type="text/javascript"
            src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js">
        </script>
        <script type="text/javascript">
            (function () {
                emailjs.init("JVvkuGQUcVqr53bpI");
            })();
        </script>

        <script type="text/javascript">
            window.onload = function() {
                document.getElementById('contactForm').addEventListener('submit', function(event) {
                    event.preventDefault();
                    emailjs.send("service_sduk1tm","template_qrcwnlo",{
                        name: document.getElementById("name").value,
                        email: document.getElementById("email").value,
                        message: document.getElementById("message").value,
                    })
                    .then(res=>{
                        document.getElementById("name").value = "";
                        document.getElementById("email").value = "";
                        document.getElementById("message").value = "";
                        console.log(res);
                        alert("Message Delivered!\nThanks and Have a Great Day :)")
                    })
                    .catch(err=>alert(err));
                })
            }
        </script>

    </head>
    <body>
        <nav class="navigation">
            <div>
                <a href="index.html" class="logo">Kotoe Takeda</a>
            </div>
            <ul class="pages">
                <li><a href="index.html" class="pageLink">Home</a>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</li>
                <li><a href="portfolio.html" class="pageLink">Portfolio</a>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</li>
                <li><a href="resume.html" class="pageLink">Resume</a>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</li>
                <li><a href="contact.html" class="currPage">Contact</a></li>
            </ul>
        </nav>
        <main>
            <h1>Let's Connect</h1>
            <form id="contactForm">
                <div class="row">
                    <div class="column" id="inputFields">
                        <input type="hidden" name="contact_number">
                        <input class="field" id="name" type="text" required placeholder="Full Name *"><br>
                        <input class="field" id="email" type="email" required placeholder="Email *"><br>
                        <input class="field" id="message" type="text" placeholder="Message"><br>
                        <br>
                        <input id="submit" type="submit" value="Send">
                    </div>
                    <div class="column">
                        <p>Thanks for visiting :&#41;<br><br>Don't forget to connect with me on LinkedIn!<br></p>
                        <br><br>
                            <a title="email: ktakeda3@gatech.edu" href="mailto: ktakeda3@gatech.edu" target="_blank" class="logoLink"><img class="logoPic" id="mailPic" src="email.png" alt="Gmail logo"></a>
                            <a title="username: kotoetakeda" href="https://www.linkedin.com/in/kotoetakeda/" target="_blank" class="logoLink"><img class="logoPic" src="linkedin.png" alt="LinkedIn logo"></a>
                            <a title="username: kotoetakeda" href="https://github.com/kotoetakeda?tab=repositories" target="_blank" class="logoLink"><img class="logoPic" src="github logo.png" alt="GitHub logo"></a>
                    </div>
            </form> 
        </main>
    </body>
</html>
